<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

</head>
<body>
  <div id="product_card">
    <img id="product-image"
     src="./images/image-product-mobile.jpg"
     srcset="
        ./images/image-product-mobile.jpg 360w,
        ./images/image-product-desktop.jpg 800w"
     sizes="(max-width: 600px) 360px, 800px"
     alt="perfume bottle">
<div id="text-area">
  <div id="header">PERFUME</div>

    <div id="product-name">Gabrielle Essence Eau De Parfum</div>

    <div id="product-description">
      A floral, solar and voluptuous interpretation composed by Olivier Polge, 
      Perfumer-Creator for the House of CHANEL.
    </div>

    <div id="price-area">
      <div id="product-price">
        $149.99
          <span id="original-price">$169.99</span>
      </div>
    </div>

    <div id="add-to-cart">
      <img id="cart-icon" src="./images/icon-cart.svg" style="width: 20px; height: 20px; margin-right: 10px;" alt="shopping cart icon">
      Add to Cart
    </div>
</div>
  </div>
</body>

  <footer class="attribution" style="position: fixed; bottom: 0; width: 100%; text-align: center;">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Alan Kajkowski</a>.
  </footer>

</html>
